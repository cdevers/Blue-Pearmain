# Blue Pearmain config
# Copy this to config.yml and fill in your values.
# config.yml is gitignored — never commit credentials.

flickr:
  # Register your own API key at https://www.flickr.com/services/apps/create/
  api_key: ""
  api_secret: ""        # your secret key — never commit this
  oauth_token: ""       # filled in by flickr_auth.py
  oauth_token_secret: "" # filled in by flickr_auth.py
  user_nsid: ""         # filled in by flickr_auth.py
  username: ""          # your Flickr username / path alias (the part in flickr.com/photos/<username>/)

database:
  path: "/volume1/flickr-curator/curator.db"   # path on NAS (SMB mount or Docker volume)

thumbnails:
  path: "/volume1/flickr-curator/thumbs"       # NAS path for cached url_l thumbnails

photos_library:
  path: "~/Pictures/Photos Library.photoslibrary"
  self_name: "Your Name"   # your name as it appears in Apple's People album

poller:
  interval_minutes: 60        # how often to check Flickr for new uploads
  batch_size: 500             # photos per API page

review:
  host: "127.0.0.1"  # localhost only. Set to "0.0.0.0" for LAN access (e.g. iPad/iPhone).
  port: 5173

logging:
  level: "INFO"               # DEBUG | INFO | WARNING | ERROR
  file: "/volume1/flickr-curator/curator.log"

notifications:
  enabled: true               # Set false to disable macOS desktop notifications from daemons

tag_protection:
  # Tags and namespace prefixes that are never removed from Flickr by the sync engine,
  # even if they are absent from Apple Photos. Flickr uses full tag replacement, so
  # any source=photos proposal that would delete a listed tag is silently suppressed.
  protected_namespaces: []    # e.g. ["family/", "archive/"]
  protected_tags: []          # e.g. ["scanned-film", "original-negative"]

# geocoding:
#   nominatim_url: "http://localhost:8080/reverse"  # local Docker instance; omit for public API

# legacy_match:
#   demote_all_confident: false  # true: any confident legacy match → needs_review, even without face/geo signal
