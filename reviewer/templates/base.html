<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content">
  <title>{% block title %}Blue Pearmain{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f0f;
      --surface:   #1a1a1a;
      --border:    #2a2a2a;
      --text:      #e0e0e0;
      --muted:     #777;
      --accent:    #0077cc;
      --green:     #2d7d46;
      --red:       #8b2020;
      --amber:     #7a5c00;
      --radius:    6px;
      --font:      -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Nav */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 24px;
      height: 48px;
    }
    nav .brand {
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.02em;
    }
    nav a {
      color: var(--muted);
      font-size: 13px;
    }
    nav a:hover, nav a.active { color: var(--text); text-decoration: none; }
    nav .spacer { flex: 1; }
    nav .stats-pill {
      font-size: 12px;
      color: var(--muted);
    }
    .nav-badge {
      display: inline-block;
      min-width: 18px;
      padding: 1px 5px;
      border-radius: 9px;
      background: var(--amber);
      color: #ffd;
      font-size: 10px;
      font-weight: 700;
      line-height: 1.5;
      text-align: center;
      vertical-align: middle;
      margin-left: 2px;
    }

    /* Layout */
    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    /* State badges */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .badge-candidate  { background: #0d3a5c; color: #6ab4f5; }
    .badge-review     { background: #4a2800; color: #f5a623; }
    .badge-private    { background: #2a0d0d; color: #e57373; }
    .badge-public     { background: #0d2e1a; color: #66bb6a; }
    .badge-approved   { background: #0d2e1a; color: #66bb6a; }
    .badge-skipped    { background: #1e1e1e; color: #888; }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
    }
    .btn:hover { background: #252525; border-color: #3a3a3a; }
    .btn-public  { background: var(--green);  border-color: var(--green);  color: #fff; }
    .btn-public:hover  { background: #3a9e5a; }
    .btn-private { background: var(--red);    border-color: var(--red);    color: #fff; }
    .btn-private:hover { background: #a83030; }
    .btn-skip    { background: transparent; color: var(--muted); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { background: #0088ee; }

    /* Tags */
    .tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag {
      background: #1e2a3a;
      color: #7ab4e8;
      border-radius: 3px;
      padding: 2px 7px;
      font-size: 11px;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 10px 16px;
      background: #222;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 1000;
    }
    #toast.show { opacity: 1; }
    #toast.ok   { border-color: var(--green); color: #66bb6a; }
    #toast.err  { border-color: var(--red);   color: #e57373; }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>

<nav>
  <span class="brand">🍎 Blue Pearmain</span>
  <a href="{{ url_for('dashboard') }}" {% if request.endpoint == 'dashboard' %}class="active"{% endif %}>Dashboard</a>
  <a href="{{ url_for('review', state='candidate_public') }}" {% if request.endpoint == 'review' %}class="active"{% endif %}>Review</a>
  <a href="{{ url_for('faces') }}" {% if request.endpoint == 'faces' %}class="active"{% endif %}>Faces</a>
  <a href="{{ url_for('zones') }}" {% if request.endpoint == 'zones' %}class="active"{% endif %}>Zones</a>
  <a href="{{ url_for('duplicates') }}" {% if request.endpoint == 'duplicates' %}class="active"{% endif %}>Duplicates <span id="nav-dup-count" class="nav-badge" style="display:none"></span></a>
  <span class="spacer"></span>
  <span class="stats-pill" id="nav-stats">Loading…</span>
</nav>

<div id="toast"></div>

{% block content %}{% endblock %}

<script>
function toast(msg, kind='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + kind;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 2500);
}

async function decide(photoId, decision, push=false, tags=null) {
  const body = { photo_id: photoId, decision, push };
  if (tags !== null) body.tags = tags;
  const r = await fetch('/api/decide', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  });
  const data = await r.json();
  if (data.ok) {
    toast(decision === 'make_public' ? '✓ Approved' : decision === 'keep_private' ? '✗ Kept private' : '→ Skipped');
  } else {
    toast('Error: ' + (data.error || JSON.stringify(data.errors)), 'err');
  }
  return data.ok;
}

// Update nav stats
async function refreshStats() {
  const r = await fetch('/api/stats');
  const s = await r.json();
  const el = document.getElementById('nav-stats');
  const review = (s.by_state?.needs_review || 0) + (s.by_state?.candidate_public || 0);
  el.textContent = `${review.toLocaleString()} to review`;
  const dupBadge = document.getElementById('nav-dup-count');
  const dupCount = s.unresolved_duplicates || 0;
  dupBadge.textContent = dupCount;
  dupBadge.style.display = dupCount > 0 ? '' : 'none';
}
refreshStats();
</script>

{% block scripts %}{% endblock %}
</body>
</html>
